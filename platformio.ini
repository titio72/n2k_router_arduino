; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


;add library
;adafruit/Adafruit SSD1306
;and set DO_DISPLAY=1
;to enable the oled display
;
;GPS_TYPE	0 -> Dummy
;			1 -> I2C (u-blox lib is required)
;			2 -> UART (u-blox lib is required)
;			3 -> UART (NMEA parser)
;DO_VE_DIRECT	0 -> disabled
;				1 -> enabled
;DO_TACHOMETER	0 -> disabled
;				1 -> enabled
;DO_DISPLAY		0 -> disabled
;				1 -> enabled

[env]
build_flags = -std=gnu++2a
build_unflags = -std=gnu++11
upload_speed = 115200
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_type = debug
monitor_filters = esp32_exception_decoder
test_build_src = yes
lib_deps =
	ttlappalainen/NMEA2000-library
	adafruit/Adafruit BME280 Library
	beegee-tokyo/DHT sensor library for ESPx@
	sparkfun/SparkFun u-blox GNSS Arduino Library
	adafruit/Adafruit SSD1306
	https://github.com/titio72/n2k_tools_libs.git

[env:esp32-s3-prod]
platform = espressif32 @ 6.9.0
framework = arduino
board = esp32-s3-fh4r2_1
upload_port = /dev/ttyACM0
upload_speed = ${env.upload_speed}
monitor_port = ${env:esp32-s3-prod.upload_port}
monitor_speed = ${env.monitor_speed}
build_type = release
build_flags =
	-D TWAI_CAN_DRIVER=1
	-D CAN_TX_PIN=GPIO_NUM_8
	-D CAN_RX_PIN=GPIO_NUM_9
	-D DO_VE_DIRECT=1
	-D VE_DIRECT_RX_PIN=GPIO_NUM_4
	-D VE_DIRECT_TX_PIN=GPIO_NUM_3
	-D GPS_TYPE=1
	-D GPS_TX_PIN=GPIO_NUM_19
	-D GPS_RX_PIN=GPIO_NUM_20
	-D DHT_PIN=GPIO_NUM_21
	-D LED_PIN=GPIO_NUM_1
	-D LED_PIN_GPS=GPIO_NUM_2
	-D LED_PIN_N2K=GPIO_NUM_21
	-D LED_RGB_N2K=1
	-D SDA_PIN=GPIO_NUM_10
    -D SCL_PIN=GPIO_NUM_11
	-D DO_TACHOMETER=1
	-D ENGINE_RPM_PIN=GPIO_NUM_5
	-D ENGINE_RPM_SIM_PIN=-1
	-D DO_DISPLAY=1
	-D WATER_TEMP_PIN=-1
	-D STW_PADDLE_PIN=-1
lib_deps =
	${env.lib_deps}
	https://github.com/jiauka/NMEA2000_esp32xx.git


[env:esp32-c3]
platform = espressif32 @ 6.9.0
framework = arduino
board = esp32-c3-devkitc-02
upload_port = /dev/ttyACM0
upload_speed = ${env.upload_speed}
monitor_port = ${env:esp32-c3.upload_port}
monitor_speed = ${env.monitor_speed}
build_flags =
    -D BOARD_HAS_PSRAM
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D TWAI_CAN_DRIVER=1
	-D CAN_TX_PIN=GPIO_NUM_8
	-D CAN_RX_PIN=GPIO_NUM_7
	-D DO_VE_DIRECT=1
	-D VE_DIRECT_RX_PIN=GPIO_NUM_5
	-D VE_DIRECT_TX_PIN=GPIO_NUM_5
	-D GPS_TYPE=1
	-D GPS_TX_PIN=GPIO_NUM_2
	-D GPS_RX_PIN=GPIO_NUM_3
	-D DHT_PIN=GPIO_NUM_6
	-D LED_PIN=GPIO_NUM_0
	-D LED_PIN_GPS=-1
	-D LED_PIN_N2K=GPIO_NUM_10
	-D LED_RGB_N2K=1
	-D SDA_PIN=GPIO_NUM_9
    -D SCL_PIN=GPIO_NUM_1
	-D DO_TACHOMETER=1
	-D ENGINE_RPM_PIN=GPIO_NUM_4
	-D ENGINE_RPM_SIM_PIN=-1
	-D DO_DISPLAY=1
	-D BME_ADDRESS=0x76
	-D WATER_TEMP_PIN=-1
	-D STW_PADDLE_PIN=-1
	-D UNITY_INCLUDE_DOUBLE 
	-D UNITY_DOUBLE_PRECISION=1e-12
lib_deps =
	${env.lib_deps}
	https://github.com/jiauka/NMEA2000_esp32xx.git

